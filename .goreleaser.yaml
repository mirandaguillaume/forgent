version: 2

builds:
  - main: ./cmd/forgent
    binary: forgent
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/mirandaguillaume/forgent/internal/cmd.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "forgent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

release:
  github:
    owner: mirandaguillaume
    name: forgent
