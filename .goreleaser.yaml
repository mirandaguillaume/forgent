version: 2
builds:
  - main: ./cmd/forgent
    binary: forgent
    ldflags:
      - -s -w -X github.com/mirandaguillaume/forgent/internal/cmd.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0

archives:
  - formats: [tar.gz]
    name_template: "forgent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  use: github-native
